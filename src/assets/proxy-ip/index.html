<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPB Panel v__VERSION__</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy&display=block" />
    __STYLE__
</head>

<body>
    <h1>
        <img class="icon" src="/favicon.ico" alt="BPB Logo"> BPB Panel <span id="panel-version"
            style="font-size: smaller;">
            v__VERSION__
        </span>
    </h1>
    <table id="geo-table">
        <thead>
            <tr>
                <th data-i18n="proxyIp.num"></th>
                <th data-i18n="proxyIp.proxyIp"></th>
                <th data-i18n="proxyIp.country"></th>
                <th data-i18n="proxyIp.city"></th>
                <th data-i18n="proxyIp.isp"></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" data-i18n="proxyIp.loading"></td>
            </tr>
        </tbody>
    </table>
    <button id="langToggle" class="lang-toggle-fixed" onclick="toggleLang()">中</button>

    <script type="module" defer>
        import { polyfillCountryFlagEmojis } from "https://cdn.skypack.dev/country-flag-emoji-polyfill";
        polyfillCountryFlagEmojis();
    </script>
    <script>__I18N__</script>
    <script>__SCRIPT__</script>
</body>

</html>
