<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPB Panel v__VERSION__</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
    __STYLE__
</head>
<body>
    <div class="theme-pill">
        <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
    </div>
    <div class="login-container">
        <div class="glass-card">
            <div class="logo-section">
                <span class="logo-icon">💦</span>
                <span class="logo-text">BPB Panel</span>
            </div>
            <div class="version-text">v__VERSION__</div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input class="neon-input" type="password" id="password" name="password" placeholder="Enter password" required>
                        <button type="button" class="toggle-vis" onclick="togglePassword(this)" tabindex="-1">👁️</button>
                    </div>
                </div>
                <div id="passwordError" class="error-msg"></div>
                <button type="submit" class="btn-neon">🔑 Login</button>
            </form>
        </div>
    </div>
    <script>__SCRIPT__</script>
</body>
</html>
